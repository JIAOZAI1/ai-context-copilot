<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Context Copilot — 侧边栏对话</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="app">
    <!-- 头部 -->
    <header class="header">
      <div class="header-left">
        <div class="header-icon">AI</div>
        <div>
          <h1>AI Copilot</h1>
          <span class="header-sub">连续对话</span>
        </div>
      </div>
      <div class="header-right">
        <button id="paste-btn" class="icon-btn" title="粘贴当前页面文本">📄</button>
        <button id="clear-btn" class="icon-btn" title="清空对话">🗑</button>
      </div>
    </header>

    <!-- 模板卡片区 -->
    <div id="template-cards-section" class="template-cards-section hidden">
      <div class="template-cards-header">
        <span class="template-cards-title">📋 提示词卡片</span>
      </div>
      <div id="template-cards-list" class="template-cards-list"></div>
    </div>

    <!-- 消息列表 -->
    <div id="messages" class="messages">
      <div class="empty-state">
        <div class="empty-icon">💬</div>
        <p class="empty-title">开始 AI 对话</p>
        <p class="empty-desc">
          粘贴页面内容或直接输入问题<br>
          支持多轮连续对话
        </p>
      </div>
    </div>

    <!-- 模板表单弹窗 -->
    <div id="template-form-overlay" class="template-form-overlay hidden">
      <div class="template-form-card">
        <div class="template-form-header">
          <h3 id="template-form-title">填写提示词变量</h3>
          <button id="template-form-close-btn" class="template-form-close-btn">✕</button>
        </div>
        <div id="template-form-body" class="template-form-body"></div>
        <div id="template-form-preview" class="template-form-preview">
          <div class="template-form-preview-header">📝 预览</div>
          <div class="template-form-preview-content"></div>
        </div>
        <div class="template-form-actions">
          <button id="template-form-cancel-btn" class="template-form-btn cancel">取消</button>
          <button id="template-form-submit-btn" class="template-form-btn submit">发送给 AI</button>
        </div>
      </div>
    </div>

    <!-- 加载指示器 -->
    <div id="loading-indicator" class="loading-indicator hidden">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>

    <!-- 输入区域 -->
    <footer class="input-area">
      <div class="input-row">
        <textarea
          id="input-box"
          rows="1"
          placeholder="输入问题，按 Enter 发送，Shift+Enter 换行"
        ></textarea>
        <button id="send-btn" class="send-btn" title="发送">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="input-hint">
        <span id="model-badge" class="model-badge">未配置</span>
        <span>Enter 发送 · Shift+Enter 换行 · 支持流式响应</span>
      </div>
    </footer>
  </div>

  <script src="providers.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
